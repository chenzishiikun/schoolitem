        <svg width="28" height="28" viewBox="0 0 24 24" aria-hidden="true" focusable="false">

  <main id="main-content" tabindex="-1">
    <section class="request container">
      <div class="request-panel">
        <h4 class="request-title">加入候补名单</h4>
        <p class="muted">我们在云南大学处于秘密开发阶段。留下邮箱，我们将在 202X 年秋季通知你。</p>
        <form class="request-form" onsubmit="event.preventDefault(); alert('已提交，感谢！');">
          <label class="sr-only" for="email">邮箱</label>
          <input id="email" type="email" placeholder="you@university.edu（你的学校邮箱）" required />
          <button class="btn btn-cta" type="submit">申请邀请</button>
        </form>
      </div>
    </section>

  <footer class="site-footer">
